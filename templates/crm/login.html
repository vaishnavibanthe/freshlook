<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ThinkArtha CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-crm: #050b14;
            --bg-card: rgba(13, 27, 49, 0.7);
            --border-crm: rgba(22, 45, 80, 0.6);
            --accent-cyan: #06b6d4;
            --accent-purple: #7c3aed;
            --text-crm-primary: #e2e8f0;
            --text-crm-secondary: #94a3b8;
            --text-crm-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fira Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-crm);
            color: var(--text-crm-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, rgba(6, 182, 212, 0.1), transparent 600px),
                              radial-gradient(circle at bottom left, rgba(124, 58, 237, 0.08), transparent 600px);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-crm);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            text-align: center;
        }

        .login-logo {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-logo span {
            color: var(--accent-cyan);
        }

        .login-subtitle {
            font-size: 13px;
            color: var(--text-crm-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-crm-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-crm-muted);
            font-size: 14px;
        }

        .form-control {
            background-color: rgba(5, 11, 20, 0.8);
            border: 1px solid var(--border-crm);
            border-radius: 8px;
            padding: 12px 14px 12px 42px;
            color: #ffffff;
            font-size: 14px;
            width: 100%;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.25);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-purple) 100%);
            color: #ffffff;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 6px 22px rgba(6, 182, 212, 0.35);
        }

        .alert-box {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .alert-box.error {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .alert-box.success {
            background-color: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert-box {% if category == 'error' %}error{% else %}success{% endif %}">
                        <span><i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i>{{ message }}</span>
                        <button onclick="this.parentElement.remove();" style="background: none; border: none; color: inherit; cursor: pointer;"><i class="fas fa-times"></i></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="login-card">
            <div class="login-logo">ThinkArtha<span>CRM</span></div>
            <div class="login-subtitle">Sales & TeleCRM Portal</div>
            
            <form action="{{ url_for('crm.crm_login') }}" method="POST">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" name="email" class="form-control" placeholder="name@company.com" required autocomplete="email">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>
                
                <button type="submit" class="btn-login">Sign In</button>
            </form>
        </div>
    </div>

</body>
</html>
