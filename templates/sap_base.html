{% extends "base.html" %}

{% block content %}
<!-- SAP Microsite Navigation Header -->
<div class="sap-microsite-container" style="padding-top: var(--nav-height);">
    <!-- SAP Sub-Navigation Bar -->
    <div class="sap-subnav-wrapper">
        <div class="container">
            <div class="sap-subnav">
                <a href="/solutions/sap" class="sap-subnav-link {% if slug == 'sap' or not slug %}active{% endif %}">
                    <i class="fas fa-gear"></i> Overview
                </a>
                <a href="/solutions/sap/sap-data-integration" class="sap-subnav-link {% if slug == 'sap-data-integration' %}active{% endif %}">
                    Data Integration
                </a>
                <a href="/solutions/sap/sap-data-migration" class="sap-subnav-link {% if slug == 'sap-data-migration' %}active{% endif %}">
                    Data Migration
                </a>
                <a href="/solutions/sap/clean-data-for-sap" class="sap-subnav-link {% if slug == 'clean-data-for-sap' %}active{% endif %}">
                    Clean Data
                </a>
                <a href="/solutions/sap/advanced-data-matching" class="sap-subnav-link {% if slug == 'advanced-data-matching' %}active{% endif %}">
                    Data Matching
                </a>
                <a href="/solutions/sap/data-reconciliation" class="sap-subnav-link {% if slug == 'data-reconciliation' %}active{% endif %}">
                    Reconciliation
                </a>
                <a href="/solutions/sap/change-data-capture" class="sap-subnav-link {% if slug == 'change-data-capture' %}active{% endif %}">
                    Change Data Capture
                </a>
                <a href="/solutions/sap/sap-test-data-management" class="sap-subnav-link {% if slug == 'sap-test-data-management' %}active{% endif %}">
                    Test Data
                </a>
            </div>
        </div>
    </div>

    <!-- Inner content block -->
    <div class="sap-microsite-content">
        {% block sap_content %}{% endblock %}
    </div>
</div>

<style>
/* SAP Microsite Shared Theme Styles */
:root {
    --sap-blue: #005a9c;
    --sap-cyan: #06b6d4;
    --sap-gold: #f59e0b;
    --sap-glow: rgba(0, 90, 156, 0.15);
}

.sap-subnav-wrapper {
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    position: sticky;
    top: 0;
    z-index: 100;
    overflow-x: auto;
    scrollbar-width: none; /* Firefox */
}
.sap-subnav-wrapper::-webkit-scrollbar {
    display: none; /* Safari/Chrome */
}

.sap-subnav {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 12px 0;
    white-space: nowrap;
}

.sap-subnav-link {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid transparent;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
}

.sap-subnav-link i {
    font-size: 11px;
}

.sap-subnav-link:hover {
    color: var(--text-primary);
    background: rgba(255, 255, 255, 0.04);
}

.sap-subnav-link.active {
    color: #f8fafc;
    background: linear-gradient(135deg, var(--sap-blue), var(--sap-cyan));
    border-color: rgba(6, 182, 212, 0.2);
    box-shadow: 0 4px 12px rgba(6, 182, 212, 0.15);
}
</style>
{% endblock %}
