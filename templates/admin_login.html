{% extends "base.html" %}

{% block title %}Admin Login - ThinkArtha Dashboard{% endblock %}

{% block content %}
<!-- Subpage Spacer -->
<div style="height: var(--nav-height); background-color: var(--bg-secondary);"></div>

<section class="section" style="min-height: 80vh; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary);">
    <div class="hero-bg-glow hero-glow-1" style="top:20%; left:20%;"></div>
    
    <div class="contact-card" style="max-width: 440px; width: 100%; padding: 48px; border: 1px solid var(--border-color); box-shadow: var(--glass-shadow); position: relative; z-index: 10;">
        <div style="text-align: center; margin-bottom: 32px;">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 12px;">
                <img src="{{ url_for('static', filename='img/artha-logo-main.png') }}" alt="Artha Solutions" class="logo-img" style="height: 45px;">
                <span style="font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-secondary);">Control Center</span>
            </div>
            <p style="color: var(--text-tertiary); font-size: 13px;">WordPress-Style Blog Administration Panel</p>
        </div>
        
        {% if error %}
        <div style="background-color: #fef2f2; border: 1px solid #fee2e2; border-radius: var(--border-radius-sm); padding: 12px 16px; margin-bottom: 24px; color: #dc2626; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px;">
            <i class="fas fa-circle-exclamation"></i> {{ error }}
        </div>
        {% endif %}
        
        <form action="/admin/login" method="POST">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" required style="padding: 12px 16px;">
            </div>
            
            <div class="form-group" style="margin-bottom: 32px;">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required style="padding: 12px 16px;">
            </div>
            
            <button type="submit" class="btn btn-primary btn-glow" style="width: 100%; padding: 14px;">
                Sign In <i class="fas fa-right-to-bracket btn-icon"></i>
            </button>
        </form>
    </div>
</section>
{% endblock %}
